<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site Blocked by LifeOps</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        max-width: 480px;
        text-align: center;
      }
      h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
      .blocked-site {
        font-size: 1.1rem;
        color: #ff6b6b;
        margin-bottom: 1.5rem;
        word-break: break-all;
      }
      .reason {
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        text-align: left;
      }
      .reason h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #a0a0ff; }
      .task-list { list-style: none; padding: 0; }
      .task-list li {
        padding: 0.5rem 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .task-list li:last-child { border-bottom: none; }
      .status-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #ff6b6b;
        flex-shrink: 0;
      }
      .status-dot.completed { background: #51cf66; }
      .message {
        color: #aaa;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .open-lifeops {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.75rem 2rem;
        background: #a0a0ff;
        color: #1a1a2e;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }
      .open-lifeops:hover { background: #8080ff; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>This site is blocked</h1>
      <div class="blocked-site" id="blockedSite"></div>
      <div class="reason">
        <h2>Complete these to unblock:</h2>
        <ul class="task-list" id="taskList">
          <li><span class="status-dot"></span> Loading...</li>
        </ul>
      </div>
      <p class="message" id="message">Complete the tasks above, then this site will automatically unblock.</p>
      <a class="open-lifeops" id="openLifeOps" href="#">Open LifeOps</a>
    </div>
    <script src="./blocked.js"></script>
  </body>
</html>
