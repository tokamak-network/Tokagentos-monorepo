# fly.toml — tokagent-billing-server
#
# ONE tokagentos instance running in BILLING_MODE=server, holding the
# Postgres connection string and the OPERATOR_PRIVATE_KEY. Operators who
# want to share this server distribute its URL to clients, who configure
# their local tokagentos in BILLING_MODE=client + TOKAGENT_GATEWAY_URL.
#
# Region: fra (Frankfurt). Pick a region close to your Postgres provider
# to minimize query latency.
# Reference: https://fly.io/docs/reference/configuration/

app            = "tokagent-billing-server"
primary_region = "fra"

[build]
  dockerfile = "apps/billing-server/Dockerfile"

# ── Non-secret config ─────────────────────────────────────────────────────────
# Secrets (BILLING_DATABASE_URL, BILLING_AUTH_SECRET, BILLING_OPERATOR_PRIVATE_KEY,
# BILLING_CHAIN_RPC_URL, BILLING_MAINNET_RPC_URL, BILLING_LITELLM_API_KEY) are
# set via `flyctl secrets set` and never appear here.
[env]
  # Container & runtime
  TOKAGENT_PORT                       = "8080"
  NODE_ENV                            = "production"
  LOG_LEVEL                           = "info"

  # Server-mode is the entire purpose of this deployment.
  BILLING_MODE                        = "server"
  BILLING_ENABLED                     = "true"
  BILLING_AUTH_REQUIRED               = "true"

  # Chain identity (mainnet) — used by the operator's vault.consumeCredits txs.
  BILLING_CHAIN_ID                    = "1"

  # Live mainnet contract addresses (immutable in v1).
  BILLING_VAULT_ADDRESS               = "0x1072f70e7c490E460fA72AC4171F7aDD1ef2d79F"
  BILLING_PTON_ADDRESS                = "0x00D1EDcE8E7c617891FF76224DFf501c568f1Ce0"

  # Composite TWAP: WTON/WETH × WETH/USDC (no direct TON/USDC V3 pool).
  BILLING_WTON_WETH_POOL_ADDRESS      = "0xC29271E3a68A7647Fd1399298Ef18FeCA3879F59"
  BILLING_WTON_IS_TOKEN0_IN_WETH_POOL = "false"
  BILLING_WETH_USDC_POOL_ADDRESS      = "0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640"
  BILLING_WETH_IS_TOKEN0_IN_USDC_POOL = "false"
  BILLING_WTON_DECIMALS               = "27"
  BILLING_WETH_DECIMALS               = "18"
  BILLING_USDC_DECIMALS               = "6"
  BILLING_TWAP_WINDOW_SECONDS         = "60"

  # LiteLLM backend endpoint (the API key is a separate Fly secret).
  BILLING_LITELLM_BASE_URL            = "https://api.ai.tokamak.network/"

  # Operator margin policy (basis points).
  BILLING_MARGIN_BPS                  = "100"
  BILLING_MARGIN_FLOOR_BPS            = "50"
  BILLING_PROMOTION_DISCOUNT_BPS      = "0"

  # Rate limiting
  BILLING_RATE_LIMIT_ENABLED          = "true"
  BILLING_RATE_LIMIT_QUOTE_PER_MIN    = "60"
  BILLING_RATE_LIMIT_SETTLE_PER_MIN   = "30"

  # Consume worker cadence
  BILLING_CONSUME_SCAN_INTERVAL_MS    = "30000"
  BILLING_CONSUME_BATCH_MIN_PTON      = "1000000000000000"
  BILLING_CONSUME_MAX_PER_CYCLE       = "50"
  BILLING_CONSUME_MAX_AGE_MS          = "300000"

  # Usage retention
  BILLING_USAGE_RETENTION_DAYS        = "90"
  BILLING_USAGE_CLEANUP_INTERVAL_MS   = "3600000"

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port        = 8080
  force_https          = true
  # Never stop — long-lived background workers (consume worker, withdraw
  # watcher, TWAP poller) lose in-flight accruals and event subscriptions
  # when a machine is stopped mid-cycle.
  auto_stop_machines   = false
  auto_start_machines  = true
  # Two machines minimum for HA. If one restarts during a deploy, the other
  # handles traffic through the bluegreen swap.
  min_machines_running = 2

  # Readiness check — Fly only routes traffic to machines that pass this.
  # tokagentos's agent exposes /api/health which reports DB + plugin status.
  [[http_service.checks]]
    grace_period = "20s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/api/health"

# ── Liveness check (separate from readiness) ──────────────────────────────────
# /api/health is the only health surface the agent exposes; reuse it as
# liveness too. Fly retries 3x before restarting the machine.
[[checks]]
  name     = "liveness"
  type     = "http"
  port     = 8080
  path     = "/api/health"
  interval = "10s"
  timeout  = "5s"

# ── VM sizing ─────────────────────────────────────────────────────────────────
# Tokagentos's agent is heavier than the gateway prototype (full plugin
# runtime, embeddings, etc.). 1024 MB gives headroom for the local AI
# embedding model + node-llama-cpp load.
[[vm]]
  cpu_kind  = "shared"
  cpus      = 2
  memory_mb = 1024

# ── No persistent volume ──────────────────────────────────────────────────────
# Unlike the earlier gateway prototype, ALL billing state lives in Postgres
# (BILLING_DATABASE_URL). No /data volume needed.
