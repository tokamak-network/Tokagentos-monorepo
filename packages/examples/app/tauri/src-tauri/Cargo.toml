[package]
name = "tokagentos-tauri-chat"
version = "2.0.0"
description = "TokagentOS simple chat (Tauri + Rust backend)"
authors = ["tokagentOS Contributors"]
license = "MIT"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# tokagentOS runtime (Rust)
tokagentos = { version = "2.0.0", features = ["native"] }
tokagentos_plugin_openai = { package = "tokagentos-plugin-openai", version = "2.0.0" }
tokagentos_plugin_xai = { package = "tokagentos-plugin-xai", version = "2.0.0" }

# TOKAGENT classic always available
tokagentos_plugin_tokagent_classic = { package = "tokagentos-plugin-tokagent-classic", version = "2.0.0" }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

