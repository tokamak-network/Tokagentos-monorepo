[package]
name = "farcaster-agent"
version = "0.1.0"
edition = "2021"
description = "Farcaster agent example using tokagentOS with OpenAI"
license = "MIT"

[dependencies]
# tokagentOS SDK
tokagentos = "2.0.0"
tokagentos-plugin-sql = "2.0.0"
tokagentos-plugin-openai = "2.0.0"
tokagentos-plugin-farcaster = { version = "2.0.0", features = ["native"] }

# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Utilities
anyhow = "1.0"
dotenvy = "0.15"
rand = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.10", features = ["v4"] }

[dev-dependencies]
tokio-test = "0.4"
