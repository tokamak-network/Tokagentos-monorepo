[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tokagentos-atropos-reasoning"
version = "2.0.0"
description = "Reasoning gym environment for TokagentOS RL training with Atropos"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "tokagentOS Contributors" }
]
keywords = ["tokagentos", "atropos", "reinforcement-learning", "reasoning", "math", "logic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "tokagentos>=2.0.0a4",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
]
openai = [
    "tokagentos-plugin-openai>=2.0.0a4",
]

[project.scripts]
tokagentos-reasoning = "tokagentos_atropos_reasoning.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["tokagentos_atropos_reasoning"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
