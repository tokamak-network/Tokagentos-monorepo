[package]
name = "telegram-agent"
version = "0.1.0"
edition = "2021"
description = "elizaOS Rust Telegram Agent Example"
license = "MIT"
publish = false

[[bin]]
name = "telegram-agent"
path = "src/main.rs"

[dependencies]
# elizaOS Core
elizaos = "2.0.0"

# elizaOS Plugins
elizaos-plugin-openai = "2.0.0"
elizaos-plugin-sql = "2.0.0"
elizaos-plugin-telegram = "2.0.0"

# Async runtime
tokio = { version = "1.42", features = ["rt-multi-thread", "macros", "signal", "sync"] }

# Error handling
anyhow = "1.0"

# Environment
dotenvy = "0.15"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization (for event payloads)
serde_json = "1.0"
