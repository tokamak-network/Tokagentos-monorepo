services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tokagent
      POSTGRES_PASSWORD: tokagent
      POSTGRES_DB: tokagent
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokagent -d tokagent"]
      interval: 2s
      timeout: 2s
      retries: 30

