[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tokagentos-app"
version = "2.0.0a7"
description = "Dynamic loader for tokagentOS App — personal AI assistant built on tokagentOS"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "tokagentos", email = "dev@app.tokagentos.ai" },
]
keywords = [
    "ai",
    "assistant",
    "agent",
    "tokagentos",
    "tokagentos-app",
    "llm",
    "cli",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://app.tokagentos.ai"
Repository = "https://github.com/elizaos/elizaos-app"
Documentation = "https://docs.app.tokagentos.ai"
Issues = "https://github.com/elizaos/elizaos-app/issues"

[project.scripts]
tokagentos-app = "tokagentos_app.cli:main"


[tool.hatch.build.targets.wheel]
packages = ["tokagentos_app"]
