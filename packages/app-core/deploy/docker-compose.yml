services:
  milady-gateway:
    image: ${MILADY_IMAGE:-milady:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MILADY_GATEWAY_TOKEN: ${MILADY_GATEWAY_TOKEN}
      MILADY_ALLOWED_ORIGINS: ${MILADY_ALLOWED_ORIGINS}
      # Set MILADY_API_TOKEN for non-localhost deployments to require auth on API routes
      MILADY_API_TOKEN: ${MILADY_API_TOKEN:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${MILADY_CONFIG_DIR}:/home/node/.milady
      - ${MILADY_WORKSPACE_DIR}:/home/node/.milady/workspace
    ports:
      - "${MILADY_GATEWAY_PORT:-18789}:${MILADY_GATEWAY_PORT:-18789}"
      - "${MILADY_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MILADY_GATEWAY_PORT:-18789}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${MILADY_GATEWAY_BIND:-lan}",
        "--port",
        "${MILADY_GATEWAY_PORT:-18789}",
      ]

  milady-cli:
    image: ${MILADY_IMAGE:-milady:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MILADY_GATEWAY_TOKEN: ${MILADY_GATEWAY_TOKEN}
      # Set MILADY_API_TOKEN for non-localhost deployments to require auth on API routes
      MILADY_API_TOKEN: ${MILADY_API_TOKEN:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${MILADY_CONFIG_DIR}:/home/node/.milady
      - ${MILADY_WORKSPACE_DIR}:/home/node/.milady/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
