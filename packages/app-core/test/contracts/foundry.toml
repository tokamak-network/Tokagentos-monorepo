[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# OpenZeppelin's Certora harnesses (lib/.../certora/) import from ../patched/ which
# doesn't exist in the release. Use: forge build --skip Harness
# Remappings for OpenZeppelin
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
