[project]
name = "tokagentos-adhdbench"
version = "0.1.0"
description = "Attention & context scaling benchmark for TokagentOS agents"
requires-python = ">=3.11"
dependencies = [
    "tokagentos",
    "rich>=15,<16",
    "pyyaml>=6.0,<7",
]

[project.optional-dependencies]
dev = ["pytest>=8.0,<9", "pytest-asyncio>=1.3,<2"]
openai = ["tokagentos-plugin-openai"]
anthropic = ["tokagentos-plugin-anthropic"]

[project.scripts]
adhdbench = "scripts.run_benchmark:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tokagentos_adhdbench"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
