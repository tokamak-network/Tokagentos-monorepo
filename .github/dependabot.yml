# Dependabot config for tokagentOS monorepo.
#
# Why these specific entries:
# - `bun` at root   → keeps the bun workspace (package.json + bun.lock) current.
#                     `npm` ecosystem would also work but `bun` understands
#                     bun.lock semantics better.
# - `github-actions`→ keeps actions/checkout@v4, oven-sh/setup-bun@v1, etc. updated.
# - `docker`        → tracks the billing-server image's base image. Only the
#                     Dockerfile path is enabled; docker-compose.billing.yml
#                     is dev-only and not worth weekly PRs.
#
# All update PRs are batched at most once per week and labelled `deps` so they
# show up together in the PR list. Manual review still required for major
# bumps (no auto-merge).
version: 2
updates:
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - deps
      - javascript

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - deps
      - ci
    ignore:
      # `.github/workflows/run-prr.yml` references the reusable workflow
      # `tokagentOS/prr/.github/workflows/run-prr-server.yml@babylon`,
      # which lives in a private (or never-published) repo Dependabot
      # can't reach. Ignoring it suppresses the
      # `git_dependencies_not_reachable` failure on every Dependabot run
      # without removing the workflow itself (it's a no-op until manually
      # triggered with the `run-prr` PR label).
      - dependency-name: tokagentOS/prr/*

  - package-ecosystem: docker
    directory: /apps/billing-server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - deps
      - docker
