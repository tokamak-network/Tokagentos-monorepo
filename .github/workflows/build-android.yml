name: Build Android

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Upload APK/AAB to latest GitHub release"
        required: false
        type: boolean
        default: false

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: apps/app
  NODE_VERSION: "23"

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/app/android/**/*.gradle*', 'apps/app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        working-directory: ${{ env.APP_DIR }}
        run: bun run build

      - name: Build Capacitor plugins
        working-directory: ${{ env.APP_DIR }}
        run: bun run plugin:build

      - name: Sync Capacitor Android
        working-directory: ${{ env.APP_DIR }}
        run: bunx capacitor sync android

      - name: Override Gradle JDK path for CI
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          # Remove the hardcoded local JDK path so Gradle uses JAVA_HOME from setup-java
          sed -i '/org.gradle.java.home=/d' gradle.properties

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Compute versionCode from semver (major*10000 + minor*100 + patch)
          IFS='.-' read -r major minor patch _ <<< "$VERSION"
          VERSION_CODE=$(( ${major:-0} * 10000 + ${minor:-0} * 100 + ${patch:-0} ))
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set version in build.gradle
        working-directory: ${{ env.APP_DIR }}/android/app
        run: |
          sed -i "s/versionCode 1/versionCode ${{ steps.version.outputs.version_code }}/" build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${{ steps.version.outputs.version }}\"/" build.gradle

      - name: Build debug APK
        if: github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.APP_DIR }}/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK & AAB
        if: github.event_name == 'release'
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          ./gradlew assembleRelease --no-daemon
          ./gradlew bundleRelease --no-daemon

      - name: Sign release APK
        if: github.event_name == 'release' && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks

          UNSIGNED_APK="${{ env.APP_DIR }}/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="${{ env.APP_DIR }}/android/app/build/outputs/apk/release/eliza-${{ steps.version.outputs.version }}.apk"

          ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

          rm /tmp/keystore.jks

      - name: Upload debug APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: eliza-android-debug
          path: ${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: eliza-android-release
          path: |
            ${{ env.APP_DIR }}/android/app/build/outputs/apk/release/*.apk
            ${{ env.APP_DIR }}/android/app/build/outputs/bundle/release/*.aab

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
          files: |
            ${{ env.APP_DIR }}/android/app/build/outputs/apk/release/*.apk
            ${{ env.APP_DIR }}/android/app/build/outputs/bundle/release/*.aab
            ${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
