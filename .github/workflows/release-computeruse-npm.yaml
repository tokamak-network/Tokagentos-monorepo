name: ComputerUse NPM Release

# Build native binaries (napi-rs) for @elizaos/computeruse on all platforms
# and publish platform packages + main package to npm.
#
# Packages published:
#   @elizaos/computeruse-win32-x64-msvc
#   @elizaos/computeruse-win32-arm64-msvc
#   @elizaos/computeruse-darwin-arm64
#   @elizaos/computeruse-darwin-x64
#   @elizaos/computeruse-linux-x64-gnu
#   @elizaos/computeruse-linux-arm64-gnu
#   @elizaos/computeruse              (main wrapper, references the above)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Windows
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            platform: win32
            suffix: "-msvc"
            build: |
              cd packages/computeruse/packages/computeruse-ts
              npm run build
              cp computeruse.win32-x64-msvc.node npm/win32-x64-msvc/
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            arch: arm64
            platform: win32
            suffix: "-msvc"
            build: |
              cd packages/computeruse/packages/computeruse-ts
              npm run build
              cp computeruse.win32-arm64-msvc.node npm/win32-arm64-msvc/
          # macOS
          - host: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            platform: darwin
            suffix: ""
            build: |
              cd packages/computeruse/packages/computeruse-ts
              npm run build
              cp computeruse.darwin-arm64.node npm/darwin-arm64/
          - host: macos-13
            target: x86_64-apple-darwin
            arch: x64
            platform: darwin
            suffix: ""
            build: |
              cd packages/computeruse/packages/computeruse-ts
              npm run build
              cp computeruse.darwin-x64.node npm/darwin-x64/
          # Linux
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64
            platform: linux
            suffix: "-gnu"
            build: |
              cd packages/computeruse/packages/computeruse-ts
              npm run build
              cp computeruse.linux-x64-gnu.node npm/linux-x64-gnu/
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux
            suffix: "-gnu"
            use_cross: true
            build: |
              cd packages/computeruse/packages/computeruse-ts
              npm run build
              cp computeruse.linux-arm64-gnu.node npm/linux-arm64-gnu/

    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup node (Windows ARM64)
        if: matrix.settings.host == 'windows-11-arm'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Setup node (default)
        if: matrix.settings.host != 'windows-11-arm'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libatspi2.0-dev libgtk-3-dev libx11-dev libxcb1-dev libxkbcommon-dev

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.settings.use_cross == true
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/computeruse/target
          key: ${{ matrix.settings.target }}-cargo-computeruse-npm-${{ hashFiles('packages/computeruse/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.settings.target }}-cargo-computeruse-npm-

      - name: Install npm dependencies
        run: |
          cd packages/computeruse/packages/computeruse-ts
          rm -f *.tgz
          rm -rf node_modules package-lock.json
          npm install --ignore-scripts --omit=optional
        shell: bash

      - name: Sync platform versions
        run: |
          cd packages/computeruse/packages/computeruse-ts
          node scripts/sync-version.js

      - name: Build native binary
        run: ${{ matrix.settings.build }}
        shell: bash

      - name: Verify build output
        run: |
          cd packages/computeruse/packages/computeruse-ts
          platform_package="npm/${{ matrix.settings.platform }}-${{ matrix.settings.arch }}${{ matrix.settings.suffix }}"
          echo "Verifying .node file in ${platform_package}/"
          ls -la "${platform_package}/" || echo "Directory not found"
          if ls "${platform_package}/"*.node 1> /dev/null 2>&1; then
            echo "Native binary found"
            ls -la "${platform_package}/"*.node
          else
            echo "ERROR: No .node file found!"
            exit 1
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            packages/computeruse/packages/computeruse-ts/npm/*/
            !packages/computeruse/packages/computeruse-ts/npm/*/*.tgz

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -name "*.node" | head -20

      - name: Copy artifacts to npm packages
        run: |
          for artifact_dir in artifacts/bindings-*; do
            if [ -d "$artifact_dir" ]; then
              echo "Processing: $artifact_dir"
              rsync -av "$artifact_dir/" packages/computeruse/packages/computeruse-ts/npm/ \
                --include="*/" --include="*.node" --exclude="*"
            fi
          done
          echo "=== Copied .node files ==="
          find packages/computeruse/packages/computeruse-ts/npm -name "*.node" -type f

      - name: Sync platform versions
        run: |
          cd packages/computeruse/packages/computeruse-ts
          node scripts/sync-version.js

      - name: Install build tools
        run: |
          cd packages/computeruse/packages/computeruse-ts
          npm install @napi-rs/cli esbuild --no-save

      - name: Generate index.js (napi platform loader) and build wrapper
        run: |
          cd packages/computeruse/packages/computeruse-ts
          # Generate index.js — the runtime loader that detects platform and
          # requires the correct @elizaos/computeruse-{platform} package.
          # Also generates index.d.ts with native type definitions.
          npx napi prepublish -t npm
          # Build wrapper.js from wrapper.ts (the high-level API surface)
          npx esbuild wrapper.ts --outfile=wrapper.js --platform=node --format=cjs --target=es2020
          # Verify critical files exist
          echo "=== Verifying publish files ==="
          for f in index.js wrapper.js wrapper.d.ts; do
            if [ ! -f "$f" ]; then
              echo "FATAL: $f is missing!"
              exit 1
            fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Publish platform packages
        if: github.event.inputs.dry_run != 'true'
        run: |
          cd packages/computeruse/packages/computeruse-ts
          MAIN_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing platform packages for version: $MAIN_VERSION"

          for dir in npm/*/; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              platform_name=$(basename "$dir")
              echo "=== $platform_name ==="
              cd "$dir"

              if ! ls *.node 1> /dev/null 2>&1; then
                echo "SKIP: No .node file in $platform_name"
                cd ../..
                continue
              fi

              PACKAGE_NAME=$(node -p "require('./package.json').name")
              PACKAGE_VERSION=$(node -p "require('./package.json').version")

              if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
                echo "SKIP: $PACKAGE_NAME@$PACKAGE_VERSION already exists"
              else
                npm publish --access public && echo "OK: $PACKAGE_NAME@$PACKAGE_VERSION" || echo "FAIL: $PACKAGE_NAME"
                # Ensure public visibility
                npm access set status=public "$PACKAGE_NAME" || true
              fi
              cd ../..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        if: github.event.inputs.dry_run != 'true'
        run: |
          cd packages/computeruse/packages/computeruse-ts
          rm -f *.tgz

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing: $PACKAGE_NAME@$PACKAGE_VERSION"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "SKIP: Already exists"
          else
            # index.js, wrapper.js, wrapper.d.ts were generated in previous step
            npm publish --access public --ignore-scripts && echo "OK" || exit 1
            # Ensure public visibility (scoped packages can default to private)
            npm access set status=public "$PACKAGE_NAME" || true
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        continue-on-error: true
        run: |
          cd packages/computeruse/packages/computeruse-ts
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Waiting 30s for npm propagation..."
          sleep 30

          for attempt in 1 2 3; do
            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
              echo "OK: $PACKAGE_NAME@$PACKAGE_VERSION is live on npm"
              exit 0
            fi
            echo "Waiting... (attempt $attempt/3)"
            sleep 15
          done
          echo "WARN: Package not yet visible (may still be propagating)"
